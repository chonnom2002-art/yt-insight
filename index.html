<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Insight Analyzer v10.1 (Director's Cut)</title>
    <style>
        :root {
            --bg-color: #121212;
            --surface-color: #1e1e1e;
            --primary-color: #bb86fc;
            --secondary-color: #03dac6;
            --accent-color: #ffb74d;
            --money-color: #81c784;
            --channel-money: #ffd54f;
            --shorts-color: #ff5252;
            --error-color: #cf6679;
            --warning-color: #f39c12;
            --text-primary: #ffffff;
            --text-secondary: #b3b3b3;
            --border-color: #333333;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', -apple-system, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-primary); line-height: 1.6; padding: 20px; }
        
        .container { max-width: 1200px; margin: 0 auto; }
        header { border-bottom: 1px solid var(--border-color); padding-bottom: 20px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;}
        h1 { font-size: 24px; color: var(--primary-color); display: flex; align-items: center; gap: 10px; margin: 0; }
        
        /* API 쿼터 게이지 UI */
        .quota-container { background: rgba(255,255,255,0.03); padding: 12px 15px; border-radius: 8px; border: 1px solid var(--border-color); min-width: 250px; flex: 1; max-width: 400px; }
        .quota-header { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; font-weight: bold; }
        .quota-header span.label { display: flex; align-items: center; gap: 5px; }
        .quota-bar-bg { width: 100%; height: 6px; background: #333; border-radius: 3px; overflow: hidden; }
        .quota-bar-fill { height: 100%; background: var(--secondary-color); width: 100%; transition: width 0.5s ease-out, background-color 0.5s ease; }

        .control-panel { background: var(--surface-color); padding: 20px; border-radius: 12px; margin-bottom: 20px; display: grid; gap: 15px; border: 1px solid var(--border-color); }
        .input-group { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        
        input, select, button { padding: 10px 15px; border-radius: 6px; border: 1px solid var(--border-color); background: var(--bg-color); color: var(--text-primary); outline: none; transition: 0.2s; }
        input:focus, select:focus { border-color: var(--primary-color); }
        input[type="text"] { flex: 1; min-width: 200px; }
        
        .toggle-wrapper { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: bold; color: var(--accent-color); background: rgba(255, 183, 77, 0.1); padding: 8px 12px; border-radius: 6px; border: 1px solid var(--accent-color); }
        .toggle-wrapper input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: var(--accent-color); }
        
        button { cursor: pointer; font-weight: bold; border: none; }
        button.primary { background: var(--primary-color); color: #000; }
        button.primary:hover { background: #9d6ce0; }
        button.secondary { background: var(--secondary-color); color: #000; }
        button.accent { background: var(--accent-color); color: #000; }
        button.action-btn { background: #333; color: white; font-size: 12px; padding: 8px 12px; margin-top: 10px; width: 100%; border-radius: 4px; border: 1px solid #444; transition: 0.2s; }
        button.action-btn:hover { background: #444; border-color: var(--secondary-color); }

        .history-panel { margin-bottom: 20px; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 8px; border: 1px solid var(--border-color); }
        .history-title { font-size: 13px; color: var(--text-secondary); margin-bottom: 10px; font-weight: bold; }
        .history-chips { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 5px; }
        .chip { background: #333; border: 1px solid #555; padding: 6px 12px; border-radius: 20px; font-size: 12px; cursor: pointer; white-space: nowrap; display: flex; align-items: center; gap: 6px; }
        .chip:hover { border-color: var(--secondary-color); color: var(--secondary-color); }
        .chip .delete { color: var(--error-color); font-weight: bold; padding-left: 5px; }

        .sort-panel { display: flex; gap: 10px; margin-bottom: 20px; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .sort-buttons { display: flex; gap: 10px; }
        
        #status { color: var(--secondary-color); font-size: 14px; margin-bottom: 15px; min-height: 20px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { background: var(--surface-color); border-radius: 10px; overflow: hidden; border: 1px solid var(--border-color); transition: transform 0.2s; display: flex; flex-direction: column; position: relative; }
        .card:hover { transform: translateY(-5px); border-color: var(--primary-color); box-shadow: 0 4px 15px rgba(187, 134, 252, 0.1); }
        .card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; border-bottom: 1px solid var(--border-color); }
        
        .monetization-badge { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.8); padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; z-index: 10; border: 1px solid #555; backdrop-filter: blur(4px); display: flex; flex-direction: column; gap: 4px; align-items: flex-end;}
        .badge-green { color: #4caf50; border-color: #4caf50; }
        .badge-yellow { color: #ffeb3b; border-color: #ffeb3b; }
        .badge-red { color: #f44336; border-color: #f44336; }
        .shorts-badge { background: var(--shorts-color); color: white; padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: bold; border: none; }

        .card-content { padding: 15px; flex: 1; display: flex; flex-direction: column; }
        .card-title { font-size: 15px; font-weight: bold; margin-bottom: 8px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .card-channel { color: var(--text-secondary); font-size: 13px; margin-bottom: 10px; }
        
        .stats { font-size: 13px; color: var(--text-secondary); display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; background: rgba(0,0,0,0.2); padding: 12px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.05); }
        .stats div { display: flex; flex-direction: column; }
        .stats span { color: var(--text-primary); font-weight: bold; font-size: 14px; }
        
        .revenue-box { grid-column: 1 / -1; background: rgba(129, 199, 132, 0.1); padding: 8px; border-radius: 4px; border-left: 3px solid var(--money-color); margin-top: 4px; display: flex; justify-content: space-between; align-items: center; }
        .revenue-box span.money { color: var(--money-color); font-size: 15px; font-weight: bold; }
        
        .channel-revenue-box { grid-column: 1 / -1; background: rgba(255, 213, 79, 0.08); padding: 8px; border-radius: 4px; border-left: 3px solid var(--channel-money); margin-top: 2px; display: flex; justify-content: space-between; align-items: center; }
        .channel-revenue-box span.money { color: var(--channel-money); font-size: 15px; font-weight: bold; }

        .rpm-info { font-size: 11px; color: var(--text-secondary); font-weight: normal; margin-left: 5px; }
        
        .viral-score { font-size: 14px; font-weight: bold; color: var(--secondary-color); margin-top: auto; padding-top: 10px; border-top: 1px dashed var(--border-color); display: flex; justify-content: space-between;}
        .fire-badge { color: #ff4500; font-size: 16px; margin-left: 5px; animation: pulse 1s infinite; }
        
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
        ::-webkit-scrollbar { height: 8px; width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); }
        ::-webkit-scrollbar-thumb { background: #555; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🚀 YouTube Insight Ver 10.1 (Director's Cut)</h1>
        
        <div class="quota-container" title="하루 10,000 단위가 제공되며, 자정에 자동 초기화됩니다. (로컬 브라우저 추정치)">
            <div class="quota-header">
                <span class="label">🔋 일일 API 잔여량 (추정)</span>
                <span id="quotaText">10,000 / 10,000</span>
            </div>
            <div class="quota-bar-bg">
                <div class="quota-bar-fill" id="quotaBar"></div>
            </div>
        </div>
    </header>

    <div class="control-panel">
        <div class="input-group">
            <input type="password" id="apiKey" placeholder="YouTube Data API v3 Key 입력" />
            <button class="secondary" onclick="saveApiKey()">Key 저장</button>
            <label class="toggle-wrapper" title="한글/영어 동시 검색">
                <input type="checkbox" id="globalTranslate"> 🌍 한/영 동시 탐색 (Dual)
            </label>
        </div>
        
        <div class="input-group">
            <input type="text" id="searchQuery" placeholder="검색어 입력 (예: 재테크, AI)" onkeypress="if(event.key==='Enter') startSearch()" />
            
            <select id="order">
                <option value="relevance">정확도순</option>
                <option value="viewCount">조회수순</option>
                <option value="date">최신순</option>
            </select>
            
            <select id="videoDuration">
                <option value="any">모든 길이</option>
                <option value="short">쇼츠/짧은 영상 (&lt; 4분)</option>
                <option value="medium">중간 길이 (4~20분)</option>
                <option value="long">긴 영상 (&gt; 20분)</option>
            </select>

            <select id="publishedAfter">
                <option value="any">모든 날짜</option>
                <option value="today">오늘</option>
                <option value="week">이번 주</option>
                <option value="month">이번 달</option>
                <option value="year">올해</option>
            </select>
            
            <button class="primary" onclick="startSearch()">🔍 딥 서치 (100개)</button>
        </div>
    </div>

    <div class="history-panel" id="historyPanel" style="display: none;">
        <div class="history-title">🕒 최근 검색 (캐시 로드 / API 소모 0)</div>
        <div class="history-chips" id="historyChips"></div>
    </div>

    <div id="status"></div>

    <div class="sort-panel" id="sortPanel" style="display: none;">
        <div class="sort-buttons">
            <button onclick="sortData('views')">👁️ 영상조회순</button>
            <button onclick="sortData('subs')">👥 구독자순</button>
            <button onclick="sortData('viral')" style="background: rgba(3, 218, 198, 0.2); color: var(--secondary-color); border-color: var(--secondary-color);">🔥 떡상지수순</button>
            <button onclick="sortData('revenue')">💸 영상수익순</button>
            <button onclick="sortData('channelRevenue')">🏢 채널수익순</button>
        </div>
        <button class="accent" onclick="exportToCSV()">💾 CSV 엑셀 다운로드</button>
    </div>

    <div class="grid" id="results"></div>
</div>

<script>
    let globalData = [];
    const CACHE_PREFIX = 'yt_final_v10_'; 
    const HISTORY_KEY = 'yt_history_v10';
    
    // 🔋 API Quota 관리 변수
    const QUOTA_KEY = 'yt_api_quota_tracker';
    const MAX_QUOTA = 10000;
    
    // 💰 비즈니스 로직
    const RPM_LONG = 3.5;       
    const RPM_SHORTS = 0.05;    
    const RPM_CHANNEL_AVG = 1.5; 

    window.onload = () => {
        const savedKey = localStorage.getItem('yt_api_key');
        if (savedKey) document.getElementById('apiKey').value = savedKey;
        initQuotaTracker();
        renderHistory();
    };

    function saveApiKey() {
        const key = document.getElementById('apiKey').value.trim();
        if (key) {
            localStorage.setItem('yt_api_key', key);
            alert('API Key가 브라우저에 저장되었습니다.');
        }
    }

    // --- 🔋 API 할당량(Quota) 추적 시스템 ---
    function initQuotaTracker() {
        const today = new Date().toDateString(); 
        let quotaData = JSON.parse(localStorage.getItem(QUOTA_KEY));
        
        if (!quotaData || quotaData.date !== today) {
            quotaData = { date: today, used: 0 };
            localStorage.setItem(QUOTA_KEY, JSON.stringify(quotaData));
        }
        renderQuota(quotaData.used);
    }

    function addQuotaUsage(units) {
        let quotaData = JSON.parse(localStorage.getItem(QUOTA_KEY));
        quotaData.used += units;
        localStorage.setItem(QUOTA_KEY, JSON.stringify(quotaData));
        renderQuota(quotaData.used);
    }

    function renderQuota(used) {
        const remaining = Math.max(0, MAX_QUOTA - used);
        const percent = (remaining / MAX_QUOTA) * 100;
        
        document.getElementById('quotaText').innerText = `${remaining.toLocaleString()} / ${MAX_QUOTA.toLocaleString()}`;
        
        const bar = document.getElementById('quotaBar');
        bar.style.width = `${percent}%`;
        
        if (percent > 50) {
            bar.style.backgroundColor = 'var(--secondary-color)';
        } else if (percent > 20) {
            bar.style.backgroundColor = 'var(--warning-color)';
        } else {
            bar.style.backgroundColor = 'var(--error-color)';
        }
    }

    // --- 유틸 함수 ---
    function parseDurationToSeconds(duration) {
        if(!duration) return 0;
        const match = duration.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
        if(!match) return 0;
        const hours = (parseInt(match[1]) || 0);
        const minutes = (parseInt(match[2]) || 0);
        const seconds = (parseInt(match[3]) || 0);
        return hours * 3600 + minutes * 60 + seconds;
    }

    function getPublishedAfterDate(val) {
        const date = new Date();
        if (val === 'today') date.setDate(date.getDate() - 1);
        else if (val === 'week') date.setDate(date.getDate() - 7);
        else if (val === 'month') date.setMonth(date.getMonth() - 1);
        else if (val === 'year') date.setFullYear(date.getFullYear() - 1);
        else return null;
        return date.toISOString();
    }

    async function translateToEnglish(text) {
        try {
            const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=ko|en`);
            const data = await res.json();
            return data.responseData.translatedText;
        } catch (error) { return text; }
    }

    function generateCacheKey(query, order, duration, dateFilter, isGlobal) {
        return `${CACHE_PREFIX}${query}_${order}_${duration}_${dateFilter}_${isGlobal}`;
    }

    // --- 메인 검색 파이프라인 ---
    async function startSearch(forceApi = false) {
        const apiKey = document.getElementById('apiKey').value.trim();
        const originalQuery = document.getElementById('searchQuery').value.trim();
        const isGlobal = document.getElementById('globalTranslate').checked;
        const order = document.getElementById('order').value;
        const duration = document.getElementById('videoDuration').value;
        const dateFilter = document.getElementById('publishedAfter').value;

        if (!apiKey) return alert("API Key를 입력해주세요.");
        if (!originalQuery) return alert("검색어를 입력해주세요.");

        const statusEl = document.getElementById('status');
        const resultsEl = document.getElementById('results');
        const cacheKey = generateCacheKey(originalQuery, order, duration, dateFilter, isGlobal);

        // 캐시 히트
        if (!forceApi) {
            const cachedData = localStorage.getItem(cacheKey);
            if (cachedData) {
                statusEl.innerHTML = "⚡ <b>로컬 캐시 로드 성공! (API 게이지 소모 0)</b>";
                globalData = JSON.parse(cachedData);
                finishSearchProcess(originalQuery, cacheKey, order, duration, dateFilter, isGlobal);
                return;
            }
        }

        resultsEl.innerHTML = "";
        globalData = [];
        document.getElementById('sortPanel').style.display = 'none';

        try {
            const publishedAfter = getPublishedAfterDate(dateFilter);
            let searchItems = [];

            if (isGlobal) {
                statusEl.innerText = "🌍 듀얼 검색 중... (한국어/영어 API 동시 호출)";
                const translatedQuery = await translateToEnglish(originalQuery);
                
                let urlKR = `https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=50&q=${encodeURIComponent(originalQuery)}&order=${order}&videoDuration=${duration}&key=${apiKey}`;
                if (publishedAfter) urlKR += `&publishedAfter=${publishedAfter}`;
                const resKR = await fetch(urlKR);
                addQuotaUsage(100);
                const dataKR = await resKR.json();
                if (dataKR.error) throw new Error(dataKR.error.message);
                if (dataKR.items) searchItems.push(...dataKR.items);

                let urlEN = `https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=50&q=${encodeURIComponent(translatedQuery)}&order=${order}&videoDuration=${duration}&key=${apiKey}`;
                if (publishedAfter) urlEN += `&publishedAfter=${publishedAfter}`;
                const resEN = await fetch(urlEN);
                addQuotaUsage(100); 
                const dataEN = await resEN.json();
                if (dataEN.error) throw new Error(dataEN.error.message);
                if (dataEN.items) searchItems.push(...dataEN.items);

            } else {
                statusEl.innerText = "🔍 검색 API 호출 중...";
                let nextPageToken = '';
                for (let i = 0; i < 2; i++) {
                    let url = `https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=50&q=${encodeURIComponent(originalQuery)}&order=${order}&videoDuration=${duration}&key=${apiKey}`;
                    if (publishedAfter) url += `&publishedAfter=${publishedAfter}`;
                    if (nextPageToken) url += `&pageToken=${nextPageToken}`;

                    const response = await fetch(url);
                    addQuotaUsage(100); 
                    const data = await response.json();
                    
                    if (data.error) throw new Error(data.error.message);
                    if (data.items) searchItems.push(...data.items);
                    nextPageToken = data.nextPageToken;
                    if (!nextPageToken) break;
                }
            }

            const uniqueIds = new Set();
            const uniqueSearchItems = [];
            for (const item of searchItems) {
                if (!uniqueIds.has(item.id.videoId)) {
                    uniqueIds.add(item.id.videoId);
                    uniqueSearchItems.push(item);
                }
            }
            searchItems = uniqueSearchItems;

            if (searchItems.length === 0) {
                statusEl.innerText = "검색 결과가 없습니다.";
                return;
            }

            statusEl.innerText = `⚙️ ${searchItems.length}개 발견! 비디오/채널 통계 API를 묶어서 호출합니다...`;

            const videoIds = searchItems.map(item => item.id.videoId);
            const channelIds = [...new Set(searchItems.map(item => item.snippet.channelId))];

            const videoStats = await fetchInChunks(videoIds, 'videos', apiKey);
            const channelStats = await fetchInChunks(channelIds, 'channels', apiKey);

            const currentDate = new Date();

            globalData = searchItems.map(item => {
                const vId = item.id.videoId;
                const cId = item.snippet.channelId;
                
                const vObj = videoStats[vId] || {};
                const vStat = vObj.statistics || { viewCount: 0 };
                const vContent = vObj.contentDetails || { duration: "PT0S" }; 
                
                const cStat = channelStats[cId] || { statistics: { subscriberCount: 0, viewCount: 0 }, snippet: { description: "", publishedAt: new Date().toISOString() } };

                const durationSec = parseDurationToSeconds(vContent.duration);
                const isShorts = durationSec <= 61; 

                const views = parseInt(vStat.viewCount) || 0;
                const subs = parseInt(cStat.statistics.subscriberCount) || 0;
                const totalChannelViews = parseInt(cStat.statistics.viewCount) || 0;
                const desc = (cStat.snippet && cStat.snippet.description) ? cStat.snippet.description.toLowerCase() : "";
                
                let viralScore = (subs > 0) ? (views / subs) * 100 : 0;
                
                let estVideoRevenue = 0;
                let estChannelMonthlyRevenue = 0;
                let monetization = { text: "🔴 수익불가 (1천명↓)", class: "badge-red" };
                
                if (subs >= 1000) {
                    const appliedRPM = isShorts ? RPM_SHORTS : RPM_LONG;
                    estVideoRevenue = views * appliedRPM;
                    
                    const channelPublishedAt = new Date(cStat.snippet.publishedAt);
                    const monthsAlive = Math.max(1, (currentDate - channelPublishedAt) / (1000 * 60 * 60 * 24 * 30.44)); 
                    const monthlyAvgViews = totalChannelViews / monthsAlive;
                    estChannelMonthlyRevenue = monthlyAvgViews * RPM_CHANNEL_AVG;
                    
                    const bizRegex = /(비즈니스|협찬|광고|문의|business|contact|sponsor|@gmail\.com|@naver\.com)/;
                    if (bizRegex.test(desc)) {
                        monetization = { text: "🟢 비즈니스/고수익 채널", class: "badge-green" };
                    } else {
                        monetization = { text: "🟡 수익창출 추정", class: "badge-yellow" };
                    }
                }

                return {
                    id: vId,
                    title: item.snippet.title,
                    channelTitle: item.snippet.channelTitle,
                    thumbnail: item.snippet.thumbnails.high.url,
                    views: views,
                    subs: subs,
                    viralScore: viralScore,
                    revenue: estVideoRevenue, 
                    channelRevenue: estChannelMonthlyRevenue,
                    isShorts: isShorts, 
                    monetization: monetization,
                    publishedAt: new Date(item.snippet.publishedAt).toLocaleDateString()
                };
            });

            try {
                localStorage.setItem(cacheKey, JSON.stringify(globalData));
            } catch (e) {
                clearOldestCache();
                localStorage.setItem(cacheKey, JSON.stringify(globalData));
            }

            statusEl.innerText = `✅ 데이터 호출 완료! 잔여 API 할당량을 확인하세요.`;
            finishSearchProcess(originalQuery, cacheKey, order, duration, dateFilter, isGlobal);

        } catch (error) {
            statusEl.innerText = "❌ 오류 발생: " + error.message;
        }
    }

    function finishSearchProcess(query, cacheKey, order, duration, dateFilter, isGlobal) {
        // ✨ PO 요청 반영: 검색 직후 기본 정렬을 '떡상지수순(viral)'으로 롤백합니다.
        sortData('viral'); 
        document.getElementById('sortPanel').style.display = 'flex';
        saveToHistory(query, cacheKey, order, duration, dateFilter, isGlobal);
    }

    async function fetchInChunks(ids, endpoint, apiKey) {
        const chunkSize = 50;
        const resultMap = {};
        for (let i = 0; i < ids.length; i += chunkSize) {
            const chunk = ids.slice(i, i + chunkSize);
            const part = endpoint === 'channels' ? 'snippet,statistics' : 'statistics,contentDetails';
            const url = `https://www.googleapis.com/youtube/v3/${endpoint}?part=${part}&id=${chunk.join(',')}&key=${apiKey}`;
            
            const res = await fetch(url);
            addQuotaUsage(1); 
            const data = await res.json();
            if (data.items) data.items.forEach(item => { resultMap[item.id] = item; });
        }
        return resultMap;
    }

    // --- 히스토리 관리 ---
    function saveToHistory(query, cacheKey, order, duration, dateFilter, isGlobal) {
        let history = JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]");
        history = history.filter(h => h.cacheKey !== cacheKey);
        history.unshift({ query, cacheKey, order, duration, dateFilter, isGlobal }); 
        
        if (history.length > 15) {
            const removed = history.pop();
            localStorage.removeItem(removed.cacheKey);
        }
        localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
        renderHistory();
    }

    function renderHistory() {
        const history = JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]");
        const panel = document.getElementById('historyPanel');
        const chipsContainer = document.getElementById('historyChips');
        
        if (history.length === 0) {
            panel.style.display = 'none';
            return;
        }

        panel.style.display = 'block';
        chipsContainer.innerHTML = '';

        history.forEach((item, index) => {
            const chip = document.createElement('div');
            chip.className = 'chip';
            chip.innerHTML = `<span>${item.isGlobal ? '🌍(한+영)' : '🔍(한)'} ${item.query}</span> <span class="delete" onclick="deleteHistory(${index}, event)">✕</span>`;
            chip.onclick = (e) => {
                if (e.target.className === 'delete') return;
                document.getElementById('searchQuery').value = item.query;
                document.getElementById('order').value = item.order;
                document.getElementById('videoDuration').value = item.duration;
                document.getElementById('publishedAfter').value = item.dateFilter;
                document.getElementById('globalTranslate').checked = item.isGlobal;
                startSearch(); 
            };
            chipsContainer.appendChild(chip);
        });
    }

    function deleteHistory(index, event) {
        event.stopPropagation();
        let history = JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]");
        const removed = history.splice(index, 1)[0];
        localStorage.removeItem(removed.cacheKey);
        localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
        renderHistory();
        if (history.length === 0) {
            document.getElementById('results').innerHTML = "";
            document.getElementById('sortPanel').style.display = 'none';
        }
    }

    function clearOldestCache() {
        let history = JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]");
        if(history.length > 0) {
            const removed = history.pop();
            localStorage.removeItem(removed.cacheKey);
            localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
        }
    }

    // --- 렌더링 및 포매팅 유틸 ---
    function sortData(type) {
        if (type === 'views') globalData.sort((a, b) => b.views - a.views);
        else if (type === 'subs') globalData.sort((a, b) => b.subs - a.subs);
        else if (type === 'viral') globalData.sort((a, b) => b.viralScore - a.viralScore);
        else if (type === 'revenue') globalData.sort((a, b) => b.revenue - a.revenue);
        else if (type === 'channelRevenue') globalData.sort((a, b) => b.channelRevenue - a.channelRevenue);
        renderGrid();
    }

    function formatMoney(num) {
        if (num === 0) return "0";
        if (num >= 100000000) return (num / 100000000).toFixed(1) + '억 ';
        if (num >= 10000) return Math.floor(num / 10000).toLocaleString() + '만 ';
        return Math.floor(num).toLocaleString() + '';
    }

    function formatNumber(num) {
        if (num === 0) return '0';
        if (num >= 10000) return (num / 10000).toFixed(1) + '만';
        if (num >= 1000) return (num / 1000).toFixed(1) + '천';
        return num.toString();
    }

    function escapeHtml(text) {
        return text.replace(/'/g, "\\'").replace(/"/g, '&quot;');
    }

    function renderGrid() {
        const resultsEl = document.getElementById('results');
        resultsEl.innerHTML = "";

        globalData.forEach(item => {
            const isFire = item.viralScore >= 10000;
            const scoreText = item.subs === 0 ? "구독자 비공개" : `${item.viralScore.toLocaleString(undefined, {maximumFractionDigits: 1})}%`;
            
            const revenueText = item.revenue > 0 ? `${formatMoney(item.revenue)}원` : '0원';
            const channelRevenueText = item.channelRevenue > 0 ? `${formatMoney(item.channelRevenue)}원` : '0원';
            const rpmInfo = item.revenue > 0 ? (item.isShorts ? '(쇼츠)' : '(일반)') : '';

            const card = document.createElement('div');
            card.className = 'card';
            
            card.innerHTML = `
                <div class="monetization-badge">
                    ${item.isShorts ? '<span class="shorts-badge">⚡ Shorts</span>' : ''}
                    <div class="${item.monetization.class}">${item.monetization.text}</div>
                </div>
                <a href="https://www.youtube.com/watch?v=${item.id}" target="_blank">
                    <img src="${item.thumbnail}" alt="Thumbnail">
                </a>
                <div class="card-content">
                    <div class="card-title">${item.title}</div>
                    <div class="card-channel">${item.channelTitle} • ${item.publishedAt}</div>
                    
                    <div class="stats">
                        <div>조회수 <span>${formatNumber(item.views)}회</span></div>
                        <div>구독자 <span>${formatNumber(item.subs)}명</span></div>
                    </div>
                    
                    <div class="revenue-box">
                        <div>이 영상의 예상 수익 <span class="rpm-info">${rpmInfo}</span></div>
                        <span class="money">${revenueText}</span>
                    </div>

                    <div class="channel-revenue-box">
                        <div>채널 예상 월평균 수익</div>
                        <span class="money">${channelRevenueText}</span>
                    </div>

                    <div class="viral-score">
                        <span>떡상지수: ${scoreText}</span>
                        ${isFire ? '<span class="fire-badge">🔥</span>' : ''}
                    </div>
                    <button class="action-btn" onclick="copyPrompt('${escapeHtml(item.title)}', '${escapeHtml(item.channelTitle)}', ${item.views}, ${item.subs}, '${revenueText}', '${channelRevenueText}', ${item.isShorts})">
                        🤖 AI 수익 벤치마킹 프롬프트 복사
                    </button>
                </div>
            `;
            resultsEl.appendChild(card);
        });
    }

    function copyPrompt(title, channel, views, subs, videoRev, channelRev, isShorts) {
        const type = isShorts ? "유튜브 쇼츠(Shorts)" : "유튜브 롱폼";
        const prompt = `다음 ${type} 영상과 채널을 비즈니스 관점에서 벤치마킹 분석해줘.\n\n[데이터]\n- 영상 제목: ${title}\n- 영상 조회수: ${views}회\n- 영상 추정 수익: 약 ${videoRev}\n- 채널명: ${channel}\n- 채널 구독자: ${subs}명\n- 채널 추정 월평균 수익: 약 ${channelRev}\n\n[요청 사항]\n1. 이 채널이 월 ${channelRev}의 수익을 올릴 수 있었던 핵심 비즈니스 모델이나 콘텐츠 전략을 추정해줘.\n2. 내가 이 영상(${title})의 포맷을 벤치마킹하여 새로운 콘텐츠를 기획할 때, 구독 전환율을 높일 수 있는 훅(Hook) 요소 3가지를 제안해줘.`;
        navigator.clipboard.writeText(prompt).then(() => {
            alert('✅ 비즈니스 분석용 AI 프롬프트가 복사되었습니다!');
        }).catch(err => alert('복사 실패: ' + err));
    }

    function exportToCSV() {
        if (globalData.length === 0) return alert("다운로드할 데이터가 없습니다.");
        const BOM = '\uFEFF';
        let csvContent = BOM + "영상종류,영상제목,채널명,게시일,조회수,구독자수,떡상지수(%),수익화상태,영상수익(원),채널월수익(원)\n";

        globalData.forEach(item => {
            let vType = item.isShorts ? "쇼츠" : "일반영상";
            let title = `"${item.title.replace(/"/g, '""')}"`;
            let channel = `"${item.channelTitle.replace(/"/g, '""')}"`;
            let rawVRev = item.revenue > 0 ? Math.floor(item.revenue) : 0;
            let rawCRev = item.channelRevenue > 0 ? Math.floor(item.channelRevenue) : 0;
            csvContent += `${vType},${title},${channel},${item.publishedAt},${item.views},${item.subs},${item.viralScore.toFixed(2)},"${item.monetization.text}",${rawVRev},${rawCRev}\n`;
        });

        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `YT_Final_${document.getElementById('searchQuery').value}_${new Date().getTime()}.csv`;
        link.click();
    }
</script>
